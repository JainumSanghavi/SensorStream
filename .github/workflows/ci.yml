name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sensor
          POSTGRES_PASSWORD: sensor
          POSTGRES_DB: sensorstream
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sensor -d sensorstream"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest against real Postgres)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://sensor:sensor@localhost:5432/sensorstream
        run: pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t sensorstream:ci .
