services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sensor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sensor}
      POSTGRES_DB: ${POSTGRES_DB:-sensorstream}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sensor} -d ${POSTGRES_DB:-sensorstream}"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sensor}:${POSTGRES_PASSWORD:-sensor}@db:5432/${POSTGRES_DB:-sensorstream}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"

volumes:
  pgdata:
